<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>FreshCheck</title>
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  body{background:#060e06;display:flex;align-items:center;justify-content:center;min-height:100vh;font-family:'Segoe UI',Tahoma,sans-serif}
  button{font-family:inherit;cursor:pointer}
  input{font-family:inherit}
  @keyframes scanLine{0%{top:0}100%{top:177px}}
  @keyframes fadeIn{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
  .fade{animation:fadeIn 0.3s ease}
  ::-webkit-scrollbar{width:4px}
  ::-webkit-scrollbar-track{background:transparent}
  ::-webkit-scrollbar-thumb{background:#1e3a1e;border-radius:4px}
</style>
</head>
<body>

<div id="app"></div>

<script>
const PRODUCTS = {
  chicken:{label:"دجاج 🐔",color:"#f5c842",shelf:{room:0.5,fridge:3,freezer:270}},
  beef:   {label:"لحم بقري 🥩",color:"#c0392b",shelf:{room:1,fridge:5,freezer:365}},
  lamb:   {label:"لحم غنم 🍖",color:"#e67e22",shelf:{room:0.5,fridge:4,freezer:300}},
};
const ENV={room:"درجة حرارة الغرفة 🌡️",fridge:"الثلاجة ❄️",freezer:"الفريزر 🧊"};
let inventory=[
  {id:"QR-001",name:"صدر دجاج",type:"chicken",env:"fridge",added:Date.now()-2*864e5,status:"fresh",barcode:"5901234123457"},
  {id:"QR-002",name:"ريش لحم بقري",type:"beef",env:"freezer",added:Date.now()-10*864e5,status:"fresh",barcode:"4006381333931"},
  {id:"QR-003",name:"كتف غنم",type:"lamb",env:"fridge",added:Date.now()-3.5*864e5,status:"warning",barcode:"8710398524578"},
];
let currentTab="inventory";

function sc(s){return s==="fresh"?"#00e676":s==="warning"?"#ffb300":"#f44336"}
function sl(s){return s==="fresh"?"طازج":s==="warning"?"قريب من الانتهاء":"منتهي الصلاحية"}
function daysLeft(item){
  const d=PRODUCTS[item.type].shelf[item.env];
  return Math.max(0,d-(Date.now()-item.added)/864e5).toFixed(1);
}

function render(){
  const stats={
    total:inventory.length,
    fresh:inventory.filter(i=>i.status==="fresh").length,
    warning:inventory.filter(i=>i.status==="warning").length,
  };
  document.getElementById("app").innerHTML=`
  <div style="width:390px;min-height:780px;background:#060e06;border-radius:40px;border:2px solid #1a2e1a;overflow:hidden;position:relative;box-shadow:0 0 80px #00e67615,0 40px 80px rgba(0,0,0,0.8)">

    <!-- Status Bar -->
    <div style="padding:14px 24px 0;display:flex;justify-content:space-between;align-items:center">
      <span style="color:#aaa;font-size:12px">9:41</span>
      <div style="width:120px;height:10px;background:#111;border-radius:10px"></div>
      <span style="color:#aaa;font-size:10px">●●●</span>
    </div>

    <!-- Header -->
    <div style="padding:16px 24px 12px;display:flex;justify-content:space-between;align-items:center">
      <div>
        <div style="display:flex;align-items:center;gap:8px">
          <div style="width:8px;height:8px;border-radius:50%;background:#00e676;box-shadow:0 0 8px #00e676"></div>
          <span style="color:#00e676;font-weight:900;font-size:22px;letter-spacing:-0.5px">FreshCheck</span>
        </div>
        <div style="color:#444;font-size:11px;margin-top:2px">الثلاجة الذكية • مرحباً 👋</div>
      </div>
      <button onclick="showNotif()" style="width:40px;height:40px;border-radius:12px;border:1px solid #1e3a1e;background:#0a180a;display:flex;align-items:center;justify-content:center;font-size:18px;position:relative">
        🔔
        ${stats.warning>0?`<div style="position:absolute;top:-4px;right:-4px;width:16px;height:16px;border-radius:50%;background:#ffb300;color:#000;font-size:10px;font-weight:700;display:flex;align-items:center;justify-content:center">${stats.warning}</div>`:""}
      </button>
    </div>

    <!-- Stats -->
    <div style="padding:0 24px 16px;display:flex;gap:10px">
      ${[["إجمالي",stats.total,"#64b5f6"],["طازج",stats.fresh,"#00e676"],["تنبيهات",stats.warning,"#ffb300"]].map(([l,v,c])=>`
      <div style="flex:1;background:#0d1f0d;border-radius:12px;padding:12px;border:1px solid ${c}20;text-align:center">
        <div style="color:${c};font-weight:800;font-size:22px">${v}</div>
        <div style="color:#555;font-size:10px;margin-top:2px">${l}</div>
      </div>`).join("")}
    </div>

    <!-- Tabs -->
    <div style="padding:0 24px 14px;display:flex;gap:8px">
      ${[["inventory","المخزون"],["analyze","تحليل الألوان"]].map(([t,l])=>`
      <button onclick="switchTab('${t}')" style="flex:1;padding:9px;border-radius:10px;border:none;background:${currentTab===t?"#00e676":"#0d1f0d"};color:${currentTab===t?"#000":"#555"};font-weight:${currentTab===t?"700":"400"};font-size:13px;transition:all 0.2s">${l}</button>`).join("")}
    </div>

    <!-- Content -->
    <div style="padding:0 24px 100px;overflow-y:auto;max-height:480px">
      ${currentTab==="inventory" ? renderInventory() : renderAnalyze()}
    </div>

    <!-- FAB -->
    <div style="position:absolute;bottom:24px;left:50%;transform:translateX(-50%);z-index:10">
      <button onclick="showScan()" style="width:64px;height:64px;border-radius:20px;border:none;background:linear-gradient(135deg,#00e676,#00c853);box-shadow:0 0 30px #00e67640,0 8px 24px rgba(0,0,0,0.5);display:flex;align-items:center;justify-content:center">
        <svg viewBox="0 0 24 24" width="28" height="28" fill="none" stroke="#000" stroke-width="2.5" stroke-linecap="round">
          <rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/>
          <rect x="3" y="14" width="7" height="7" rx="1"/><path d="M14 14h3v3M20 14v.01M14 20h.01M17 20h3M20 17v3"/>
        </svg>
      </button>
    </div>
  </div>`;
}

function renderInventory(){
  if(!inventory.length) return `<div style="text-align:center;padding:60px 0;color:#444"><div style="font-size:48px;margin-bottom:12px">🧊</div><div>المخزون فارغ، أضف منتجاً جديداً</div></div>`;
  return inventory.map(item=>{
    const p=PRODUCTS[item.type], dl=daysLeft(item), c=sc(item.status);
    return `
    <div class="fade" style="background:#0d1f0d;border:1px solid #1a2e1a;border-radius:16px;padding:16px;display:flex;align-items:center;gap:14px;margin-bottom:10px">
      <div style="width:48px;height:48px;border-radius:12px;background:${p.color}20;border:1px solid ${p.color}40;display:flex;align-items:center;justify-content:center;font-size:22px;flex-shrink:0">
        ${p.label.split(" ")[1]}
      </div>
      <div style="flex:1;min-width:0">
        <div style="color:#fff;font-weight:700;font-size:15px;margin-bottom:3px">${item.name}</div>
        <div style="color:#666;font-size:11px;margin-bottom:6px">${ENV[item.env].split(" ")[0]} • ${item.barcode}</div>
        <div style="display:flex;align-items:center;gap:8px">
          <div style="padding:2px 10px;border-radius:20px;font-size:11px;font-weight:700;background:${c}15;color:${c};border:1px solid ${c}40">${sl(item.status)}</div>
          <div style="color:#555;font-size:11px">${dl} يوم متبقي</div>
        </div>
      </div>
      <button onclick="showColor()" style="padding:8px 12px;border-radius:10px;border:1px solid #1e3a1e;background:#0a180a;color:#00e676;font-size:11px;white-space:nowrap;flex-shrink:0">تحديث 🔬</button>
    </div>`;
  }).join("");
}

function renderAnalyze(){
  return `
  <div class="fade">
    <div style="background:#0d1f0d;border:1px solid #1e3a1e;border-radius:16px;padding:20px;margin-bottom:14px;text-align:center">
      <div style="font-size:36px;margin-bottom:10px">🔬</div>
      <div style="color:#fff;font-weight:700;font-size:16px;margin-bottom:8px">تحليل بكسلات الملصق</div>
      <div style="color:#666;font-size:12px;line-height:1.7;margin-bottom:16px">
        اختر لون الملصق الملون على اللحم، وسيقوم التطبيق بمقارنته بالدرجات المرجعية وإخبارك بحالة الطازجية
      </div>
      <button onclick="showColor()" style="padding:12px 28px;border-radius:12px;border:none;background:#00e676;color:#000;font-weight:700;font-size:14px">ابدأ التحليل</button>
    </div>
    <div style="background:#0d1f0d;border:1px solid #1a2a1a;border-radius:16px;padding:18px">
      <div style="color:#00e676;font-weight:700;margin-bottom:12px;font-size:14px">🎨 مرجع الألوان</div>
      ${[["طازج جداً","#d4a04a","لون ذهبي فاتح"],["طازج","#c4883a","لون بني دافئ"],["قريب من الانتهاء","#b8702a","لون بني داكن"],["منتهي","#a85822","لون بني محمر"]].map(([l,c,n])=>`
      <div style="display:flex;align-items:center;gap:12px;margin-bottom:10px">
        <div style="width:32px;height:32px;border-radius:8px;background:${c};flex-shrink:0"></div>
        <div>
          <div style="color:#fff;font-size:13px">${l}</div>
          <div style="color:#555;font-size:11px">${n}</div>
        </div>
      </div>`).join("")}
    </div>
  </div>`;
}

function switchTab(t){currentTab=t;render()}

// ── Overlay helpers ──────────────────────────────
function overlay(html){
  const d=document.createElement("div");
  d.id="overlay";
  d.style.cssText="position:fixed;inset:0;background:rgba(0,0,0,0.88);z-index:200;display:flex;align-items:center;justify-content:center;padding:20px";
  d.innerHTML=html;
  document.body.appendChild(d);
}
function closeOverlay(){const o=document.getElementById("overlay");if(o)o.remove()}

// ── Notifications ────────────────────────────────
function showNotif(){
  overlay(`
  <div class="fade" style="background:#0d1f0d;border:1px solid #1e3a1e;border-radius:20px;padding:24px;width:100%;max-width:360px">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:20px">
      <h3 style="color:#00e676;font-size:17px">التنبيهات 🔔</h3>
      <button onclick="closeOverlay()" style="background:none;border:none;color:#aaa;font-size:20px">✕</button>
    </div>
    ${[
      {icon:"⚠️",title:"كتف غنم",msg:"اقترب موعد استهلاكها — يُنصح بالاستخدام اليوم",color:"#ffb300",time:"قبل ساعة"},
      {icon:"✅",title:"صدر دجاج",msg:"في حالة طازجة ممتازة",color:"#00e676",time:"قبل 3 ساعات"},
      {icon:"🧊",title:"ريش لحم بقري",msg:"محفوظ في الفريزر بشكل صحيح",color:"#64b5f6",time:"أمس"},
    ].map(n=>`
    <div style="display:flex;gap:12px;padding:14px;border-radius:12px;background:#0a180a;border:1px solid ${n.color}20;margin-bottom:10px">
      <div style="font-size:22px">${n.icon}</div>
      <div style="flex:1">
        <div style="color:${n.color};font-weight:700;font-size:13px;margin-bottom:3px">${n.title}</div>
        <div style="color:#888;font-size:12px;line-height:1.5">${n.msg}</div>
        <div style="color:#444;font-size:11px;margin-top:5px">${n.time}</div>
      </div>
    </div>`).join("")}
  </div>`);
}

// ── Color Analysis ───────────────────────────────
function showColor(){
  overlay(`
  <div class="fade" style="background:#0d1f0d;border:1px solid #1e3a1e;border-radius:20px;padding:28px;width:100%;max-width:360px">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:20px">
      <h3 style="color:#00e676;font-size:17px">تحليل اللون 🔬</h3>
      <button onclick="closeOverlay()" style="background:none;border:none;color:#aaa;font-size:20px">✕</button>
    </div>
    <p style="color:#888;font-size:13px;line-height:1.6;margin-bottom:20px">اختر لون الملصق الأقرب لما تراه على اللحم الآن.</p>
    <div style="display:flex;gap:10px;margin-bottom:8px;justify-content:center" id="colorBtns">
      ${["#d4a04a","#c4883a","#b8702a","#a85822"].map((c,i)=>`
      <button onclick="selectColor(this,'${c}',${i})" data-c="${c}" data-i="${i}"
        style="width:52px;height:52px;border-radius:12px;background:${c};border:3px solid transparent;transition:transform 0.2s"></button>`).join("")}
    </div>
    <div style="display:flex;font-size:11px;color:#666;margin-bottom:16px;justify-content:space-between"><span>طازج جداً</span><span>منتهي</span></div>
    <button id="analyzeBtn" onclick="runAnalysis()" disabled
      style="width:100%;padding:13px;border-radius:12px;border:none;background:#1e3a1e;color:#444;font-weight:700;font-size:14px;transition:all 0.3s">
      تحليل البكسلات
    </button>
    <div id="colorResult"></div>
  </div>`);
}

let _selColor=null,_selIdx=null;
function selectColor(btn,c,i){
  _selColor=c; _selIdx=i;
  document.querySelectorAll("#colorBtns button").forEach(b=>{
    b.style.border="3px solid transparent";
    b.style.transform="scale(1)";
    b.style.boxShadow="none";
  });
  btn.style.border="3px solid #00e676";
  btn.style.transform="scale(1.15)";
  btn.style.boxShadow="0 0 12px #00e67660";
  const ab=document.getElementById("analyzeBtn");
  ab.disabled=false; ab.style.background="#00e676"; ab.style.color="#000";
}

function runAnalysis(){
  const ab=document.getElementById("analyzeBtn");
  ab.disabled=true; ab.textContent="⏳ جاري التحليل..."; ab.style.background="#1e3a1e"; ab.style.color="#444";
  setTimeout(()=>{
    const statuses=["fresh","fresh","warning","expired"];
    const s=statuses[_selIdx];
    const c=s==="fresh"?"#00e676":s==="warning"?"#ffb300":"#f44336";
    const bg=s==="fresh"?"#0a2a0a":s==="warning"?"#2a200a":"#2a0a0a";
    const icon=s==="fresh"?"✅":s==="warning"?"⚠️":"🚨";
    const label=s==="fresh"?"طازج":s==="warning"?"قريب من الانتهاء":"منتهي الصلاحية";
    const note=s==="warning"?"<p style='color:#aaa;font-size:12px;margin:6px 0 0'>يُنصح بالاستهلاك قريباً</p>":
               s==="expired"?"<p style='color:#aaa;font-size:12px;margin:6px 0 0'>لا يُنصح بالاستهلاك</p>":"";
    document.getElementById("colorResult").innerHTML=`
    <div class="fade" style="margin-top:16px;padding:14px;border-radius:12px;background:${bg};border:1px solid ${c}30;text-align:center">
      <div style="font-size:28px;margin-bottom:6px">${icon}</div>
      <div style="color:${c};font-weight:700;font-size:16px">${label}</div>${note}
    </div>`;
    ab.textContent="تحليل البكسلات"; ab.disabled=false; ab.style.background="#00e676"; ab.style.color="#000";
  },1800);
}

// ── Scan Modal ───────────────────────────────────
let scanStep=1, scanMode=null, scanForm={name:"",type:"chicken",env:"fridge"};

function showScan(){scanStep=1;scanMode=null;scanForm={name:"",type:"chicken",env:"fridge"};renderScan()}

function renderScan(){
  const inner = scanStep===1 ? renderScanStep1() : (scanMode===null ? renderScanStep2() : scanMode==="quick" ? renderScanQuick() : renderScanSave());
  const existing=document.getElementById("overlay");
  if(existing){existing.querySelector(".scan-inner").innerHTML=inner;return;}
  overlay(`<div class="fade scan-inner" style="background:#0d1f0d;border:1px solid #1e3a1e;border-radius:20px;padding:28px;width:100%;max-width:360px">${inner}</div>`);
}

function renderScanStep1(){return `
  <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:24px">
    <h3 style="color:#00e676">مسح جديد</h3>
    <button onclick="closeOverlay()" style="background:none;border:none;color:#aaa;font-size:20px">✕</button>
  </div>
  <div style="text-align:center">
    <div id="scanBox" style="width:180px;height:180px;margin:0 auto 24px;border-radius:20px;border:2px dashed #1e3a1e;display:flex;align-items:center;justify-content:center;background:#0a180a;position:relative;overflow:hidden;transition:border-color 0.3s">
      <svg viewBox="0 0 100 100" width="80" height="80" fill="none">
        <rect x="5" y="5" width="30" height="30" rx="4" stroke="#00e676" stroke-width="4" fill="none"/>
        <rect x="65" y="5" width="30" height="30" rx="4" stroke="#00e676" stroke-width="4" fill="none"/>
        <rect x="5" y="65" width="30" height="30" rx="4" stroke="#00e676" stroke-width="4" fill="none"/>
        <rect x="13" y="13" width="14" height="14" rx="2" fill="#00e676"/>
        <rect x="73" y="13" width="14" height="14" rx="2" fill="#00e676"/>
        <rect x="13" y="73" width="14" height="14" rx="2" fill="#00e676"/>
        <line x1="65" y1="65" x2="95" y2="65" stroke="#00e676" stroke-width="3"/>
        <line x1="65" y1="75" x2="85" y2="75" stroke="#00e676" stroke-width="3"/>
        <line x1="65" y1="85" x2="95" y2="85" stroke="#00e676" stroke-width="3"/>
        <line x1="65" y1="95" x2="75" y2="95" stroke="#00e676" stroke-width="3"/>
        <line x1="85" y1="95" x2="95" y2="95" stroke="#00e676" stroke-width="3"/>
      </svg>
    </div>
    <p style="color:#666;font-size:13px;margin-bottom:20px">وجّه الكاميرا نحو الباركود أو رمز QR</p>
    <button id="scanBtn" onclick="startScan()" style="width:100%;padding:13px;border-radius:12px;border:none;background:#00e676;color:#000;font-weight:700;font-size:15px">📷 مسح الآن</button>
  </div>`
}

function startScan(){
  const b=document.getElementById("scanBox");
  const btn=document.getElementById("scanBtn");
  b.style.border="2px solid #00e676";
  btn.style.background="#1e3a1e"; btn.style.color="#444"; btn.disabled=true; btn.textContent="يتم المسح...";
  const bar=document.createElement("div");
  bar.style.cssText="position:absolute;top:0;left:0;right:0;height:3px;background:#00e676;box-shadow:0 0 12px #00e676;animation:scanLine 1s infinite";
  b.appendChild(bar);
  setTimeout(()=>{scanStep=2;renderScan()},2000);
}

function renderScanStep2(){return `
  <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:24px">
    <h3 style="color:#00e676">مسح جديد</h3>
    <button onclick="closeOverlay()" style="background:none;border:none;color:#aaa;font-size:20px">✕</button>
  </div>
  <div style="background:#0a2a0a;border-radius:12px;padding:14px;margin-bottom:20px;text-align:center">
    <div style="color:#00e676;font-size:13px;margin-bottom:4px">✅ تم التعرف على المنتج</div>
    <div style="color:#fff;font-weight:700">لحم بتلو طازج — 500g</div>
    <div style="color:#666;font-size:12px">4006381333931</div>
  </div>
  <p style="color:#aaa;font-size:13px;text-align:center;margin-bottom:16px">كيف تريد المتابعة؟</p>
  <div style="display:flex;flex-direction:column;gap:10px">
    <button onclick="setScanMode('quick')" style="padding:14px;border-radius:12px;border:1px solid #1e3a1e;background:#0a180a;color:#fff;font-size:14px">⚡ مسح سريع — فحص فوري دون حفظ</button>
    <button onclick="setScanMode('save')" style="padding:14px;border-radius:12px;border:none;background:#00e676;color:#000;font-size:14px;font-weight:700">💾 حفظ في المخزون</button>
  </div>`
}

function setScanMode(m){scanMode=m;renderScan()}

function renderScanQuick(){
  const gauge=buildGaugeSVG("fresh");
  return `
  <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:24px">
    <h3 style="color:#00e676">نتيجة الفحص</h3>
    <button onclick="closeOverlay()" style="background:none;border:none;color:#aaa;font-size:20px">✕</button>
  </div>
  <div style="text-align:center">${gauge}
    <p style="color:#aaa;font-size:13px;margin:12px 0">الحالة الآنية بناءً على بيانات الملصق</p>
    <button onclick="closeOverlay()" style="width:100%;padding:13px;border-radius:12px;border:1px solid #1e3a1e;background:transparent;color:#aaa">إغلاق</button>
  </div>`
}

function buildGaugeSVG(status){
  const v=status==="fresh"?0.85:status==="warning"?0.45:0.1;
  const c=status==="fresh"?"#00e676":status==="warning"?"#ffb300":"#f44336";
  const a=v*180, r=70, cx=100, cy=100;
  const rad=deg=>deg*Math.PI/180;
  const ax=cx+r*Math.cos(rad(180+a)), ay=cy+r*Math.sin(rad(180+a));
  return `<svg viewBox="0 0 200 120" width="180" style="display:block;margin:0 auto">
    <path d="M 30,100 A 70,70 0 0,1 170,100" stroke="#1e2d1e" stroke-width="14" fill="none" stroke-linecap="round"/>
    <path d="M 30,100 A 70,70 0 0,1 ${ax},${ay}" stroke="${c}" stroke-width="14" fill="none" stroke-linecap="round" style="filter:drop-shadow(0 0 8px ${c})"/>
    <text x="100" y="90" text-anchor="middle" fill="${c}" font-size="22" font-weight="800" font-family="monospace">${Math.round(v*100)}%</text>
    <text x="100" y="108" text-anchor="middle" fill="#aaa" font-size="10" font-family="sans-serif">${sl(status)}</text>
  </svg>`;
}

function renderScanSave(){
  const p=PRODUCTS[scanForm.type];
  return `
  <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:20px">
    <h3 style="color:#00e676">حفظ في المخزون</h3>
    <button onclick="closeOverlay()" style="background:none;border:none;color:#aaa;font-size:20px">✕</button>
  </div>
  <div style="display:flex;flex-direction:column;gap:14px">
    <div>
      <label style="color:#aaa;font-size:12px;display:block;margin-bottom:6px">اسم مخصص (اختياري)</label>
      <input id="nameInput" value="${scanForm.name}" oninput="scanForm.name=this.value" placeholder="مثال: صدر دجاج العشاء"
        style="width:100%;padding:10px 12px;border-radius:10px;border:1px solid #1e3a1e;background:#0a180a;color:#fff;font-size:14px"/>
    </div>
    <div>
      <label style="color:#aaa;font-size:12px;display:block;margin-bottom:8px">نوع المنتج</label>
      <div style="display:flex;gap:8px">
        ${Object.entries(PRODUCTS).map(([k,v])=>`
        <button onclick="setScanType('${k}')" style="flex:1;padding:9px 4px;border-radius:10px;font-size:11px;border:1px solid ${scanForm.type===k?v.color:"#1e3a1e"};background:${scanForm.type===k?v.color+"20":"#0a180a"};color:${scanForm.type===k?v.color:"#666"}">${v.label}</button>`).join("")}
      </div>
    </div>
    <div>
      <label style="color:#aaa;font-size:12px;display:block;margin-bottom:8px">بيئة التخزين</label>
      <div style="display:flex;flex-direction:column;gap:6px">
        ${Object.entries(ENV).map(([k,v])=>`
        <button onclick="setScanEnv('${k}')" style="padding:9px 12px;border-radius:10px;font-size:12px;text-align:right;border:1px solid ${scanForm.env===k?"#00e676":"#1e3a1e"};background:${scanForm.env===k?"#00e67615":"#0a180a"};color:${scanForm.env===k?"#00e676":"#666"}">${v}</button>`).join("")}
      </div>
    </div>
    <div style="background:#0a2a0a;border-radius:10px;padding:12px;font-size:12px;color:#aaa">
      ⏱ العمر المتوقع: <span style="color:#00e676;font-weight:700">${p.shelf[scanForm.env]} يوم</span>
    </div>
    <button onclick="saveItem()" style="padding:13px;border-radius:12px;border:none;background:#00e676;color:#000;font-weight:700;font-size:15px">✓ حفظ في المخزون</button>
  </div>`
}

function setScanType(t){scanForm.type=t;renderScan()}
function setScanEnv(e){scanForm.env=e;renderScan()}
function saveItem(){
  const p=PRODUCTS[scanForm.type];
  inventory.unshift({
    id:`QR-${Date.now()}`,
    name:scanForm.name||p.label,
    type:scanForm.type, env:scanForm.env,
    added:Date.now(), status:"fresh",
    barcode:Math.random().toString().slice(2,15)
  });
  closeOverlay(); render();
}

render();
</script>
</body>
</html>
